services:
  resume-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-resume-ai
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - SELENIUM_URL=http://selenium:4444/wd/hub
    volumes:
      - ./.env:/app/.env
      - ./app.py:/app/app.py
      - ./dashboard:/app/dashboard
      - ./config:/app/config
      - ./ui_components.py:/app/ui_components.py
      - ./assets:/app/assets
      - ./feedback:/app/feedback
      - ./jobs:/app/jobs
      - ./resume_analytics:/app/resume_analytics
      - ./style:/app/style
      - ./utils:/app/utils
      - ./run_app.py:/app/run_app.py
    restart: unless-stopped
    depends_on:
      - selenium

  selenium:
    image: seleniarm/standalone-chromium:latest
    container_name: smart-resume-selenium
    ports:
      - "4444:4444"
      - "7900:7900"
    shm_size: 2gb
    restart: unless-stopped

volumes:
  app_data:
