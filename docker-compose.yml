services:
  resume-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-resume-ai
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - SELENIUM_URL=http://selenium:4444/wd/hub
    volumes:
      - ./.env:/app/.env
    restart: unless-stopped
    depends_on:
      - selenium

  selenium:
    image: seleniarm/standalone-chromium:latest
    container_name: smart-resume-selenium
    ports:
      - "4444:4444"
      - "7900:7900"
    shm_size: 2gb
    restart: unless-stopped

volumes:
  app_data:
