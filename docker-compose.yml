# FastAPI backend only. The React app runs separately (e.g. Vite on :5173) and
# calls this service. Mount a named volume on /app/data so resume_data.db and
# feedback.db survive restarts (see config/database.py and feedback/feedback.py).
services:
  resume-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-resume-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DATA_DIR=/app/data
    volumes:
      - app_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app_data:
